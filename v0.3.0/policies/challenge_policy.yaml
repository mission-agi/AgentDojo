# TaskPilot v0.3.0 — Inter-Role Challenge Policy
# Changes from v0.2.0:
#   - Added event_emission: challenge_raised for every challenge trigger
#   - Bumped version to 0.3.0

version: "0.3.0"
name: TaskPilot Challenge Policy
description: >
  Defines who can challenge whom, triggers, evidence requirements, escalation,
  and event emission rules. Enables transparent, auditable challenge tracking
  via event bus.

challenge_rules:
  - challenger: ROLE_PM
    targets: [ROLE_SDE, ROLE_UX]
    grounds: "Scope creep, value vs. cost misalignment, priority drift"
    challenge_triggers:
      - trigger: "Feature not in approved PRD scope"
        description: "SDE or UX implementing feature not listed in cycle_plan"
        event_emission:
          event_type: challenge_raised
          challenge_type: scope_violation
      - trigger: "Effort estimate exceeds 2x initial estimate"
        description: "SDE revises estimate upward by 100%+ without re-prioritization"
        event_emission:
          event_type: challenge_raised
          challenge_type: estimate_overrun
      - trigger: "Priority shift without stakeholder approval"
        description: "Scope reordering without PM sign-off"
        event_emission:
          event_type: challenge_raised
          challenge_type: priority_drift
    required_evidence:
      - Reference to PRD scope section
      - Cost-value analysis
      - Stakeholder impact assessment
    resolution_sla_hours: 24
    escalation_ladder:
      - level_1: Direct discussion between challenger and target
      - level_2: Bring evidence to group review
      - level_3: Human-in-loop escalation
    human_in_loop: true

  - challenger: ROLE_SDE
    targets: [ROLE_PM, ROLE_PE]
    grounds: "Technical infeasibility, architectural debt accumulation, timeline risk"
    challenge_triggers:
      - trigger: "Proposed feature requires architectural change > 500 LOC"
        description: "Feature breaks existing patterns or introduces significant refactor"
        event_emission:
          event_type: challenge_raised
          challenge_type: architectural_risk
      - trigger: "Dependency on unproven technology"
        description: "Feature relies on untested library or unvalidated approach"
        event_emission:
          event_type: challenge_raised
          challenge_type: technology_risk
      - trigger: "Timeline conflicts with existing commitments"
        description: "Schedule does not account for build, test, or review time"
        event_emission:
          event_type: challenge_raised
          challenge_type: timeline_conflict
    required_evidence:
      - Technical feasibility analysis
      - Effort estimate with breakdown
      - Alternative approaches with trade-offs
    resolution_sla_hours: 24
    escalation_ladder:
      - level_1: Technical discussion with evidence
      - level_2: Architecture review board
      - level_3: Human-in-loop escalation
    human_in_loop: true

  - challenger: ROLE_PE
    targets: [ROLE_SDE]
    grounds: "Performance regressions, scalability risks, resource efficiency"
    challenge_triggers:
      - trigger: "P95 latency increase > 10%"
        description: "Dashboard load or trending operation exceeds baseline by 10%+"
        event_emission:
          event_type: challenge_raised
          challenge_type: latency_regression
      - trigger: "Memory usage increase > 20%"
        description: "Peak memory footprint grows by 20%+ without justification"
        event_emission:
          event_type: challenge_raised
          challenge_type: memory_regression
      - trigger: "Battery impact increase > 15%"
        description: "Daily battery drain rises by 15%+ in profiling"
        event_emission:
          event_type: challenge_raised
          challenge_type: battery_regression
    required_evidence:
      - Before/after performance measurements
      - Profiling data
      - User impact assessment
    resolution_sla_hours: 12
    escalation_ladder:
      - level_1: Performance review with data
      - level_2: Architecture review with PE lead
      - level_3: Human-in-loop escalation
    human_in_loop: false

  - challenger: ROLE_QA
    targets: [ROLE_PM, ROLE_SDE, ROLE_PE, ROLE_UX]
    grounds: "Coverage holes, flaky tests, defect escapes, quality regressions"
    challenge_triggers:
      - trigger: "Test coverage drops below 60% for any module"
        description: "Coverage metric degrades below threshold"
        event_emission:
          event_type: challenge_raised
          challenge_type: coverage_gap
      - trigger: "Flake rate exceeds 5%"
        description: "Non-deterministic test failures detected in suite"
        event_emission:
          event_type: challenge_raised
          challenge_type: test_flakiness
      - trigger: "P0 defect found in production"
        description: "Critical defect escapes to production"
        event_emission:
          event_type: challenge_raised
          challenge_type: defect_escape
      - trigger: "Defect escape rate exceeds 10%"
        description: "More than 10% of pre-release defects escape to production"
        event_emission:
          event_type: challenge_raised
          challenge_type: escape_rate_high
    required_evidence:
      - Coverage reports or test results
      - Defect escape analysis
      - Quality trend data
    resolution_sla_hours: 8
    escalation_ladder:
      - level_1: Quality gate block with evidence
      - level_2: Release hold
      - level_3: Human-in-loop escalation
    human_in_loop: false

  - challenger: ROLE_UX
    targets: [ROLE_PM, ROLE_SDE]
    grounds: "Usability regression, accessibility violations, HIG non-compliance"
    challenge_triggers:
      - trigger: "WCAG 2.1 AA violation introduced"
        description: "Accessibility audit detects new WCAG AA non-compliance"
        event_emission:
          event_type: challenge_raised
          challenge_type: accessibility_violation
      - trigger: "VoiceOver flow broken"
        description: "Screen reader navigation disrupted or impossible"
        event_emission:
          event_type: challenge_raised
          challenge_type: voiceover_broken
      - trigger: "Inconsistency with design system"
        description: "UI element uses non-standard colors, spacing, typography"
        event_emission:
          event_type: challenge_raised
          challenge_type: design_system_violation
    required_evidence:
      - Accessibility audit findings
      - HIG reference
      - User flow comparison (before/after)
    resolution_sla_hours: 24
    escalation_ladder:
      - level_1: Design review with evidence
      - level_2: UX committee review
      - level_3: Human-in-loop escalation
    human_in_loop: true

  - challenger: ROLE_SEC
    targets: [ROLE_SDE, ROLE_PM]
    grounds: "Threat model gaps, injection risks, data exposure, privacy violations"
    challenge_triggers:
      - trigger: "Unencrypted PII detected"
        description: "Personally identifiable information (health data, email, etc.) stored or transmitted unencrypted"
        event_emission:
          event_type: challenge_raised
          challenge_type: pii_exposure
      - trigger: "Missing input validation on user-facing endpoint"
        description: "API or UI accepts user input without validation (injection risk)"
        event_emission:
          event_type: challenge_raised
          challenge_type: input_validation_gap
      - trigger: "Credential exposure in logs or commits"
        description: "API keys, tokens, passwords found in logs, code, or configuration"
        event_emission:
          event_type: challenge_raised
          challenge_type: credential_exposure
      - trigger: "Privacy violation: PII in crash reports or telemetry"
        description: "Health data, user identifiers, or sensitive fields in MetricKit, analytics, or debug output"
        event_emission:
          event_type: challenge_raised
          challenge_type: privacy_violation
    required_evidence:
      - STRIDE analysis findings
      - Data flow audit
      - Remediation plan
    resolution_sla_hours: 4
    escalation_ladder:
      - level_1: Security review block
      - level_2: Mandatory fix before merge
      - level_3: Human-in-loop escalation (P0 security)
    human_in_loop: false
    priority: critical

challenge_lifecycle:
  states:
    - state: raised
      description: "Challenge submitted with evidence"
      event_emission:
        event_type: challenge_raised
    - state: acknowledged
      description: "Target acknowledges challenge and agrees to address"
      event_emission:
        event_type: challenge_acknowledged
    - state: under_review
      description: "Challenge is being investigated or discussed"
      event_emission:
        event_type: challenge_under_review
    - state: resolved
      description: "Challenge addressed; remediation complete"
      event_emission:
        event_type: challenge_resolved
    - state: closed
      description: "Challenge closed (accepted remediation or deferred)"
      event_emission:
        event_type: challenge_closed
    - state: escalated
      description: "Challenge escalated to human review or higher authority"
      event_emission:
        event_type: challenge_escalated

challenge_metrics:
  - metric: "Average time to resolution (hours)"
    target: "< SLA for each role pair"
  - metric: "Challenge resolution rate"
    target: "> 90% of raised challenges resolved"
  - metric: "False positive rate"
    target: "< 5% (challenges raised but later dismissed as not valid)"
  - metric: "Challenge escalation rate"
    target: "< 20% of challenges require human escalation"
