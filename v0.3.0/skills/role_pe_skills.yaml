# TaskPilot v0.3.0 — Performance Engineer (ROLE_PE) Skills
# Changes from v0.2.0:
# - Added `depends_on` field to specify prerequisite skills
# - Added `produces` field to list artifact outputs (matches artifacts_produced)
# - FIXED SKILL_PE_BATTERY_IMPACT with watchOS-specific exit criteria:
#   * Instruments Energy gauge profiling for foreground, background, complication modes
#   * Background task budget usage (watchOS limit: 4 minutes/hour)
#   * Complication refresh budget verification (50 pushes/day, 4 scheduled refreshes/hour max)
#   * Energy impact categorization (Low/Medium/High per Apple standards)
#   * Background App Refresh and URLSession impact measurement

skills:
  - skill_id: SKILL_PE_ARCH_REVIEW
    role: ROLE_PE
    description: >
      Review system architecture for scalability, resource efficiency,
      and performance characteristics. Identify bottlenecks and anti-patterns.
    prerequisites:
      - System design document available
      - Architecture diagrams produced
    depends_on: []
    produces:
      - arch_review.md
    evidence_required:
      - Architecture review document with findings
      - Bottleneck analysis
      - Scalability assessment
    artifacts_produced:
      - arch_review.md
    scoring_rubric:
      thoroughness: "All data flows and resource paths analyzed"
      specificity: "Bottlenecks identified with evidence"
      actionability: "Each finding has a recommended fix"
    anti_patterns:
      - Generic feedback without specific bottleneck identification
      - Ignoring memory/battery impact on mobile
      - No quantitative analysis
    test_hooks:
      - Verify all data flows covered
      - Check findings have fix recommendations
    exit_criteria:
      - All data flows and resource paths analyzed
      - Bottlenecks identified with severity and evidence
      - Scalability limits documented
      - Recommendations reviewed by SDE

  - skill_id: SKILL_PE_LOAD_TEST
    role: ROLE_PE
    description: >
      Design and execute load/stress tests to validate performance
      under expected and peak conditions.
    prerequisites:
      - System under test is stable
      - Performance baselines established
    depends_on: []
    produces:
      - load_test_plan.md
      - load_test_results.md
    evidence_required:
      - Load test plan with scenarios
      - Test results with P50/P95/P99 latencies
      - Resource utilization measurements
    artifacts_produced:
      - load_test_plan.md
      - load_test_results.md
    scoring_rubric:
      realism: "Test scenarios reflect real usage patterns"
      thoroughness: "Tests at 1x, 2x, and peak traffic levels"
      measurement: "P95 latency, memory, CPU, battery measured"
    anti_patterns:
      - Unrealistic test scenarios
      - Only testing happy path
      - No sustained-run testing
    test_hooks:
      - Verify tests cover 2x peak traffic
      - Check P95 latency measurements exist
    exit_criteria:
      - Load test executed at 2x expected peak traffic
      - P95 latency within SLO threshold
      - No memory leaks over 1-hour sustained run
      - Regression comparison against baseline documented

  - skill_id: SKILL_PE_BATTERY_IMPACT
    role: ROLE_PE
    description: >
      Assess battery and thermal impact of app features on watchOS devices.
      Identify energy-intensive operations and recommend optimizations with
      specific focus on watchOS background task budgets and complication refresh limits.
    prerequisites:
      - App running on watchOS device or simulator
      - Instruments/profiling tools available
    depends_on: []
    produces:
      - battery_impact.md
    evidence_required:
      - Energy impact report with Instruments Energy gauge measurements
      - Per-feature battery usage breakdown for foreground, background, and complication modes
      - Optimization recommendations with estimated energy savings
      - watchOS budget compliance verification
    artifacts_produced:
      - battery_impact.md
    scoring_rubric:
      measurement: "Quantitative energy measurements per feature and mode"
      comparison: "Before/after measurements for optimizations"
      coverage: "Foreground, background, and complication refresh modes all assessed"
      watchos_compliance: "Background task and complication refresh budgets verified"
    anti_patterns:
      - Only measuring foreground impact
      - No background process analysis
      - Ignoring watchOS-specific budget constraints
      - Recommendations without energy savings estimates
    test_hooks:
      - Verify Instruments Energy gauge profiling completed
      - Check background task budget usage documented
      - Verify complication refresh budget verified
    exit_criteria:
      - Instruments Energy gauge profiling completed for foreground, background, and complication refresh modes
      - Background task budget usage measured against watchOS budget (4 minutes/hour limit)
      - Complication refresh budget verified (max 50 pushes/day, max 4 scheduled refreshes/hour)
      - Energy impact categorized per Apple Energy Impact levels (Low/Medium/High)
      - Background App Refresh and URLSession background download impact measured
      - Per-feature breakdown documented with mode-specific energy costs
      - Optimization recommendations with estimated energy savings
      - SDE reviewed for implementation feasibility

  - skill_id: SKILL_PE_MEMORY_PROFILING
    role: ROLE_PE
    description: >
      Profile memory usage to identify leaks, excessive allocations,
      and opportunities for memory optimization.
    prerequisites:
      - App running with profiling enabled
    depends_on: []
    produces:
      - memory_profile.md
    evidence_required:
      - Memory profile report
      - Leak detection results
      - Allocation hotspot analysis
    artifacts_produced:
      - memory_profile.md
    scoring_rubric:
      detection: "All leaks identified and categorized"
      impact: "Memory impact quantified in MB"
      remediation: "Fix recommendations with expected savings"
    anti_patterns:
      - Only checking for crashes, not gradual leaks
      - Ignoring temporary allocation spikes
      - No before/after measurements
    test_hooks:
      - Verify leak detection ran
      - Check hotspot analysis exists
    exit_criteria:
      - Memory profile completed for main user flows
      - Zero confirmed memory leaks
      - Allocation hotspots identified
      - Peak memory usage within device constraints

  - skill_id: SKILL_PE_PERF_CHALLENGE
    role: ROLE_PE
    description: >
      Challenge SDE on performance regressions, scalability assumptions,
      or resource efficiency issues.
    prerequisites:
      - Performance data available
      - SDE design or implementation to review
    depends_on:
      - SKILL_PE_ARCH_REVIEW
    produces:
      - perf_challenge.md
    evidence_required:
      - Performance challenge with quantitative evidence
      - Regression analysis (if applicable)
      - Alternative approaches with performance projections
    artifacts_produced:
      - perf_challenge.md
    scoring_rubric:
      evidence: "Challenges backed by measurements"
      impact: "User impact quantified"
      alternatives: "Better-performing alternatives proposed"
    anti_patterns:
      - Gut-feel challenges without data
      - Premature optimization concerns
      - No user impact assessment
    test_hooks:
      - Verify challenges have quantitative evidence
      - Check alternatives are proposed
    exit_criteria:
      - Every challenge backed by quantitative measurements
      - User impact assessed
      - Alternative approaches proposed with projections
      - Resolution accepted by SDE
