# TaskPilot v0.3.0 — Product Manager (ROLE_PM) Skills
# Changes from v0.2.0:
# - Added `depends_on` field to specify prerequisite skills
# - Added `produces` field to list artifact outputs (matches artifacts_produced)

skills:
  - skill_id: SKILL_PM_REQ_ANALYSIS
    role: ROLE_PM
    description: >
      Analyze raw user research, interview transcripts, and market data
      to produce a structured requirements document with prioritized user stories,
      acceptance criteria, and a priority matrix.
    prerequisites:
      - User research artifacts exist (interviews, surveys, or market data)
      - Stakeholder context is available
    depends_on: []
    produces:
      - requirements.md
      - priority_matrix.md
    evidence_required:
      - Requirements document with numbered user stories
      - Priority matrix (MoSCoW or RICE scoring)
      - Trade-off analysis for high-risk items
    artifacts_produced:
      - requirements.md
      - priority_matrix.md
    scoring_rubric:
      completeness: "All user stories have testable acceptance criteria"
      clarity: "No ambiguous terms; each story is independently actionable"
      traceability: "Every requirement traces to a research finding"
    anti_patterns:
      - Writing user stories without acceptance criteria
      - Skipping trade-off analysis for complex features
      - Including implementation details in requirements
    test_hooks:
      - Verify every user story has at least one acceptance criterion
      - Check priority matrix covers 100% of in-scope features
    exit_criteria:
      - All user stories have testable acceptance criteria
      - Priority matrix covers 100% of in-scope features
      - At least one trade-off documented per high-risk item
      - Sign-off artifact reviewed by SDE and QA
      - No open clarification questions older than 24 hours

  - skill_id: SKILL_PM_PRD_GENERATION
    role: ROLE_PM
    description: >
      Generate a Product Requirements Document (PRD) from approved requirements,
      including scope, assumptions, constraints, success metrics, and risk register.
    prerequisites:
      - SKILL_PM_REQ_ANALYSIS exit criteria met
    depends_on:
      - SKILL_PM_REQ_ANALYSIS
    produces:
      - prd.md
      - risk_register.md
    evidence_required:
      - PRD document with all required sections
      - Risk register with mitigation plans
    artifacts_produced:
      - prd.md
      - risk_register.md
    scoring_rubric:
      completeness: "All PRD sections present (scope, assumptions, constraints, metrics, risks)"
      measurability: "Every success metric has a target number and measurement method"
      risk_coverage: "Every P0/P1 feature has at least one identified risk"
    anti_patterns:
      - Vague success metrics without numbers
      - Missing assumptions section
      - No risk register
    test_hooks:
      - Verify PRD has all mandatory sections
      - Check every success metric has a target value
    exit_criteria:
      - PRD contains scope, assumptions, constraints, metrics, and risk sections
      - Every success metric has a numeric target and measurement method
      - Risk register covers all P0/P1 features
      - SDE and UX have reviewed and signed off

  - skill_id: SKILL_PM_MARKET_POSITIONING
    role: ROLE_PM
    description: >
      Define market positioning including target segments, value proposition,
      competitive analysis, and go-to-market strategy.
    prerequisites:
      - Market research data available
      - Product scope defined
    depends_on: []
    produces:
      - market_positioning.md
      - competitive_analysis.md
    evidence_required:
      - Competitive landscape analysis
      - Target segment personas (2-3)
      - Value proposition canvas
    artifacts_produced:
      - market_positioning.md
      - competitive_analysis.md
    scoring_rubric:
      differentiation: "Clear differentiators vs. top 3 alternatives"
      specificity: "Target segments have demographic, behavioral, and psychographic data"
      actionability: "Go-to-market plan has concrete milestones and owners"
    anti_patterns:
      - Generic positioning without competitive context
      - Single undifferentiated target audience
      - Launch plan without milestones
    test_hooks:
      - Verify at least 2 target segments defined
      - Check competitive analysis covers top 3 alternatives
    exit_criteria:
      - At least 2 target segments with personas
      - Competitive analysis covers top 3 alternatives with differentiators
      - Go-to-market plan has milestones with dates
      - Value proposition is validated against research data

  - skill_id: SKILL_PM_METRICS_FRAMEWORK
    role: ROLE_PM
    description: >
      Define the metrics framework including OKRs, metric tree, and dashboard
      specifications for tracking product health.
    prerequisites:
      - PRD approved with success metrics
    depends_on:
      - SKILL_PM_PRD_GENERATION
    produces:
      - okrs.md
      - metric_tree.md
      - dashboard_spec.md
    evidence_required:
      - OKR document aligned to product goals
      - Metric tree showing leading/lagging indicators
      - Dashboard specification
    artifacts_produced:
      - okrs.md
      - metric_tree.md
      - dashboard_spec.md
    scoring_rubric:
      alignment: "Every OKR maps to a PRD success metric"
      actionability: "Every metric has a data source and collection method"
      balance: "Mix of leading and lagging indicators"
    anti_patterns:
      - Vanity metrics without actionable signals
      - Missing data source definitions
      - OKRs disconnected from product goals
    test_hooks:
      - Verify OKR-to-PRD traceability
      - Check every metric has a defined data source
    exit_criteria:
      - Every OKR maps to a PRD success metric
      - Metric tree has both leading and lagging indicators
      - Every metric has a defined data source and collection cadence
      - Dashboard spec reviewed by SDE for feasibility

  - skill_id: SKILL_PM_SCOPE_CHALLENGE
    role: ROLE_PM
    description: >
      Challenge SDE and UX proposals for scope creep, value-cost misalignment,
      or priority drift. Produce a scope review artifact.
    prerequisites:
      - SDE or UX has produced a design/proposal
      - PRD exists as baseline scope
    depends_on:
      - SKILL_PM_PRD_GENERATION
    produces:
      - scope_review.md
    evidence_required:
      - Scope review document with accept/reject/modify decisions
      - Cost-value analysis for challenged items
    artifacts_produced:
      - scope_review.md
    scoring_rubric:
      thoroughness: "Every proposed change evaluated against PRD scope"
      evidence: "Decisions backed by cost-value analysis, not opinion"
      constructiveness: "Rejections include alternative approaches"
    anti_patterns:
      - Rubber-stamping without analysis
      - Rejecting without alternatives
      - Ignoring cost estimates from SDE
    test_hooks:
      - Verify every scope change has accept/reject/modify decision
      - Check rejected items have alternative proposals
    exit_criteria:
      - Every proposed change has a documented decision with rationale
      - Cost-value analysis provided for all challenged items
      - Alternative approaches documented for rejected items
      - Resolution accepted by proposing role

  - skill_id: SKILL_PM_LAUNCH_READINESS
    role: ROLE_PM
    description: >
      Evaluate launch readiness by checking all role sign-offs, KPI baselines,
      and rollout plan completeness. Produce Go/No-Go recommendation.
    prerequisites:
      - All P0 features implemented and tested
      - All role sign-offs collected
    depends_on:
      - SKILL_PM_METRICS_FRAMEWORK
    produces:
      - launch_readiness.md
    evidence_required:
      - Launch readiness checklist with all items checked
      - KPI baseline measurements
      - Go/No-Go recommendation with rationale
    artifacts_produced:
      - launch_readiness.md
    scoring_rubric:
      completeness: "All checklist items addressed"
      evidence: "Go/No-Go backed by KPI data, not gut feel"
      risk_awareness: "Known risks documented with mitigation status"
    anti_patterns:
      - Declaring launch-ready without all sign-offs
      - Ignoring open P0 defects
      - No rollback plan
    test_hooks:
      - Verify all role sign-offs present
      - Check zero open P0 defects
    exit_criteria:
      - All role sign-offs collected
      - Zero open P0 defects
      - KPI baselines measured and documented
      - Rollout plan includes rollback procedure
      - Go/No-Go recommendation documented with evidence

  - skill_id: SKILL_PM_STAKEHOLDER_UPDATE
    role: ROLE_PM
    description: >
      Produce regular stakeholder update summarizing progress, blockers,
      decisions made, and upcoming milestones.
    prerequisites:
      - Active project with at least one completed phase
    depends_on: []
    produces:
      - stakeholder_update.md
      - decision_log_entry.md
    evidence_required:
      - Stakeholder update document
      - Decision log entries for the period
    artifacts_produced:
      - stakeholder_update.md
      - decision_log_entry.md
    scoring_rubric:
      transparency: "Blockers and risks are surfaced, not hidden"
      conciseness: "Update fits in one page"
      actionability: "Every blocker has a proposed resolution or owner"
    anti_patterns:
      - Hiding blockers or missed milestones
      - Update longer than 2 pages
      - No next-steps section
    test_hooks:
      - Verify blockers section exists
      - Check next-steps section exists with owners
    exit_criteria:
      - Blockers section present with proposed resolutions
      - Decision log updated for the period
      - Next milestones listed with dates and owners
      - Update reviewed before distribution
