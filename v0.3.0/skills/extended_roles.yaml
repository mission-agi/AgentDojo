# TaskPilot v0.3.0 — Extended Role Skills (Security, Release Manager, Documentation)
# Changes from v0.2.0:
# - Added `depends_on` field to specify prerequisite skills
# - Added `produces` field to list artifact outputs (matches artifacts_produced)
# - Maintains all watchOS and Apple-specific exit criteria from v0.2.0

# ROLE_SEC — Security Engineer (3 skills)
security_skills:
  - skill_id: SKILL_SEC_THREAT_MODEL
    role: ROLE_SEC
    description: Perform STRIDE threat modeling on new endpoints and data flows. Include PII logging audit.
    prerequisites: [System design available, Data flow diagrams exist]
    depends_on: []
    produces:
      - threat_model.md
    evidence_required: [STRIDE analysis, Data flow diagram with trust boundaries, Mitigation plan, Log audit report]
    artifacts_produced: [threat_model.md]
    scoring_rubric:
      coverage: "STRIDE analysis covers all new endpoints and data flows"
      depth: "Mitigation plans are specific and implementable"
      logging: "Log audit verifies no PII in debug/info level logs"
    anti_patterns:
      - STRIDE analysis missing one or more threat categories
      - Generic mitigations without specific implementation steps
      - No log audit for PII exposure
      - Missing trust boundary definitions
    test_hooks:
      - Verify STRIDE categories all addressed
      - Check mitigations have implementation steps
      - Verify log audit report exists
    exit_criteria:
      - STRIDE analysis completed for all new endpoints (all 6 categories addressed)
      - All HIGH findings have mitigation plan with specific implementation steps
      - Data flow diagram updated with trust boundaries for every external interface
      - SDE reviewed mitigations for feasibility and accepted or challenged
      - Log audit confirms no PII at debug/info log levels (grep-verifiable)
      - Threat model document peer-reviewed by at least one other role

  - skill_id: SKILL_SEC_DATA_HANDLING
    role: ROLE_SEC
    description: >
      Audit data handling for PII exposure, encryption at rest/transit, key management,
      and key lifecycle (creation, rotation, deletion, re-encryption).
    prerequisites: [Data model available, Crypto implementation exists]
    depends_on: []
    produces:
      - data_security_audit.md
    evidence_required: [Data handling audit, Encryption coverage report, Key lifecycle audit]
    artifacts_produced: [data_security_audit.md]
    scoring_rubric:
      pii_coverage: "All PII fields identified with encryption status"
      key_lifecycle: "Key creation, rotation, deletion, and re-encryption all audited"
      apple_practices: "Keychain usage follows Apple best practices"
      migration: "Key rotation includes data re-encryption verification"
    anti_patterns:
      - Auditing encryption without checking key rotation
      - Missing re-encryption step during key rotation
      - No verification that old-key data is migrated
      - Assuming keychain handles rotation automatically
    test_hooks:
      - Verify key lifecycle audit section exists
      - Check re-encryption verification documented
      - Verify PII field inventory is complete
    exit_criteria:
      - All PII fields identified and encryption status documented (inventory complete)
      - Key lifecycle fully audited: creation, rotation, deletion, re-encryption paths verified
      - Re-encryption of existing data verified after key rotation (test or code-path evidence)
      - No unencrypted PII at rest (verified via code audit or static analysis)
      - Keychain usage follows Apple best practices (reviewed against Apple docs)
      - Key rotation failure mode documented with recovery procedure
      - Audit reviewed by SDE for implementation accuracy

  - skill_id: SKILL_SEC_AUTH_REVIEW
    role: ROLE_SEC
    description: Review authentication and authorization mechanisms for vulnerabilities.
    prerequisites: [Auth implementation exists]
    depends_on: []
    produces:
      - auth_review.md
    evidence_required: [Auth review document, Vulnerability findings, Session management assessment]
    artifacts_produced: [auth_review.md]
    scoring_rubric:
      flow_coverage: "All auth flows (login, logout, token refresh, biometric) reviewed"
      storage: "No credentials stored in plain text, UserDefaults, or NSLog"
      session: "Session management assessed for timeout, invalidation, and replay"
      biometric: "Face ID/Touch ID implementation reviewed for bypass"
    anti_patterns:
      - Reviewing only happy-path auth flow
      - Missing session invalidation checks
      - No biometric bypass assessment
      - Ignoring token refresh and expiry
    test_hooks:
      - Verify all auth flows listed and reviewed
      - Check credential storage audit exists
      - Verify session management section present
    exit_criteria:
      - All auth flows reviewed (login, logout, refresh, biometric, account recovery)
      - No credential storage in plain text, UserDefaults, or NSLog (code search evidence)
      - Session management assessed: timeout policy, invalidation on logout, replay prevention
      - Biometric auth implementation reviewed for bypass vulnerabilities
      - Token expiry and refresh flow validated for race conditions
      - All findings reviewed by SDE with fix commitments for HIGH severity items

# ROLE_RM — Release Manager (3 skills)
release_skills:
  - skill_id: SKILL_RM_GO_NO_GO
    role: ROLE_RM
    description: Collect role sign-offs and make Go/No-Go launch decision.
    prerequisites: [All P0 features tested, All roles have produced sign-off artifacts]
    depends_on: []
    produces:
      - go_no_go.md
    evidence_required: [Sign-off collection, KPI dashboard, Go/No-Go decision, Rollback plan]
    artifacts_produced: [go_no_go.md]
    scoring_rubric:
      completeness: "All role sign-offs collected with evidence"
      rigor: "Decision backed by KPI data, not opinion"
      safety: "Rollback plan tested, not just documented"
    anti_patterns:
      - Proceeding without all role sign-offs
      - Go decision with open P0 defects
      - Rollback plan untested
      - No KPI evidence in decision
    test_hooks:
      - Verify all role sign-offs present
      - Check P0/P1 defect count is zero
      - Verify rollback plan has test evidence
    exit_criteria:
      - All role sign-offs collected (PM, SDE, PE, QA, UX, SEC minimum)
      - Zero open P0/P1 defects at time of decision
      - Rollback plan documented AND tested (dry-run evidence provided)
      - KPI dashboard shows all thresholds met (screenshot or JSON evidence)
      - Decision document records explicit Go or No-Go with rationale
      - If No-Go: specific blockers listed with owners and resolution timeline

  - skill_id: SKILL_RM_ROLLOUT_PLAN
    role: ROLE_RM
    description: Create phased rollout plan with monitoring checkpoints.
    prerequisites: [Go/No-Go approved]
    depends_on:
      - SKILL_RM_GO_NO_GO
    produces:
      - rollout_plan.md
    evidence_required: [Rollout plan, Monitoring dashboard spec, Rollback procedure]
    artifacts_produced: [rollout_plan.md]
    scoring_rubric:
      phasing: "Clear stages with percentages and duration"
      monitoring: "Metrics and alerts defined per stage"
      rollback: "Triggers and procedure documented"
    anti_patterns:
      - Single-phase rollout to 100%
      - No monitoring between phases
      - Rollback without specific triggers
    test_hooks:
      - Verify phased stages defined
      - Check monitoring metrics per stage
      - Verify rollback triggers documented
    exit_criteria:
      - Phased rollout stages defined with percentages and minimum duration per stage
      - Monitoring metrics and alert thresholds defined for each stage
      - Rollback triggers documented (specific metric thresholds that trigger rollback)
      - Rollback procedure documented with step-by-step instructions
      - SDE and PE reviewed rollout plan for technical feasibility
      - Communication plan for each rollout stage defined

  - skill_id: SKILL_RM_RELEASE_NOTES
    role: ROLE_RM
    description: Generate user-facing release notes from changelog and PRD.
    prerequisites: [Changelog available, Features documented]
    depends_on:
      - SKILL_RM_GO_NO_GO
    produces:
      - release_notes.md
    evidence_required: [Release notes draft, Feature highlights, Known issues list]
    artifacts_produced: [release_notes.md]
    scoring_rubric:
      completeness: "All user-facing changes documented"
      clarity: "Language is clear, non-technical, and user-friendly"
      honesty: "Known issues disclosed"
    anti_patterns:
      - Technical jargon in user-facing notes
      - Missing known issues section
      - Omitting breaking changes
      - No PM review of messaging
    test_hooks:
      - Verify all changelog items mapped to release note entries
      - Check known issues section exists
      - Verify language review completed
    exit_criteria:
      - All user-facing changes from changelog documented in release notes
      - Known issues section included with workarounds where available
      - Breaking changes called out explicitly with migration guidance
      - Language reviewed for clarity by non-technical reviewer (PM or DOC)
      - PM approved messaging and feature emphasis
      - Release notes formatted for target platform (App Store, TestFlight, etc.)

# ROLE_DOC — Documentation Engineer (3 skills)
documentation_skills:
  - skill_id: SKILL_DOC_API_DOCS
    role: ROLE_DOC
    description: Generate API documentation from contracts and implementations.
    prerequisites: [API contracts defined]
    depends_on: []
    produces:
      - api_docs.md
    evidence_required: [API documentation, Code examples, Error reference]
    artifacts_produced: [api_docs.md]
    scoring_rubric:
      coverage: "All public endpoints/interfaces documented"
      examples: "Each endpoint has at least one usage example"
      errors: "All error codes documented with meaning and recovery action"
    anti_patterns:
      - Auto-generated docs without review
      - Missing error code documentation
      - No code examples
      - Documenting internal APIs as public
    test_hooks:
      - Verify all public endpoints documented
      - Check code examples compile/parse
      - Verify error codes section exists
    exit_criteria:
      - All public endpoints/interfaces documented with parameters, return types, and constraints
      - Error codes documented with meaning, HTTP status, and recovery action
      - At least one code example per endpoint (compilable/parseable)
      - SDE reviewed for accuracy against implementation
      - Version and deprecation policy stated

  - skill_id: SKILL_DOC_RUNBOOK
    role: ROLE_DOC
    description: Create operational runbook for common tasks and incident response.
    prerequisites: [System architecture available, Monitoring configured]
    depends_on: []
    produces:
      - runbook.md
    evidence_required: [Runbook document, Incident response procedures, Escalation contacts]
    artifacts_produced: [runbook.md]
    scoring_rubric:
      coverage: "Common operational tasks and incident types documented"
      actionability: "Step-by-step procedures, not just descriptions"
      contacts: "Escalation contacts and on-call info included"
    anti_patterns:
      - High-level descriptions without step-by-step procedures
      - Missing escalation paths
      - No severity classification for incidents
      - Untested procedures
    test_hooks:
      - Verify step-by-step format used
      - Check escalation contacts included
      - Verify severity classification exists
    exit_criteria:
      - Common operational tasks documented with step-by-step procedures
      - Incident response procedures defined for each severity level (P0/P1/P2)
      - Escalation ladder documented with contacts and response time expectations
      - Procedures tested via tabletop exercise or dry-run (evidence provided)
      - SRE/PE reviewed for technical accuracy
      - Runbook indexed and searchable (table of contents, section headers)

  - skill_id: SKILL_DOC_ONBOARDING
    role: ROLE_DOC
    description: Create developer onboarding guide for new contributors.
    prerequisites: [Codebase exists, Build system configured]
    depends_on: []
    produces:
      - onboarding.md
    evidence_required: [Onboarding guide, Quick start instructions, Architecture overview]
    artifacts_produced: [onboarding.md]
    scoring_rubric:
      completeness: "End-to-end setup instructions from clone to running tests"
      architecture: "Architecture overview with module relationships"
      time_to_productive: "New contributor can submit first PR within guide's scope"
    anti_patterns:
      - Assuming system knowledge
      - Missing dependency installation steps
      - No troubleshooting section
      - Outdated screenshots or paths
    test_hooks:
      - Verify setup instructions end-to-end
      - Check architecture overview exists
      - Verify troubleshooting section present
    exit_criteria:
      - Setup instructions verified end-to-end on clean environment (evidence of successful run)
      - Architecture overview included with module dependency diagram
      - Common troubleshooting issues documented with solutions
      - Prerequisite tools and versions explicitly listed
      - SDE reviewed for accuracy against current codebase
      - Time-to-first-PR estimated and stated (target and actual if tested)
