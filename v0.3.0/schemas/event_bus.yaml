version: "0.3.0"
name: TaskPilot Event Bus
description: >
  Lifecycle event emission for skill execution tracking and orchestrator
  observability. Inspired by CrewAI eventing system. Events are immutable,
  append-only records enabling cycle-over-cycle analysis and skill performance
  trending.

event_types:
  - event_type: skill_started
    description: "Emitted when a skill begins execution"
    required_fields: [event_id, timestamp, skill_id, role_id, phase, input_artifacts]
    optional_fields: [depends_on_completed, context_from_memory, estimated_duration_minutes]
    example:
      event_id: "EVT_20260310_001"
      timestamp: "2026-03-10T14:30:00Z"
      skill_id: "SKILL_SDE_IMPLEMENTATION"
      role_id: "ROLE_SDE"
      phase: "BUILD"
      input_artifacts: ["cycle_plan.md", "api_schema.yaml"]
      depends_on_completed: ["SKILL_PM_REQ_ANALYSIS"]

  - event_type: skill_completed
    description: "Emitted when a skill meets all exit criteria and completes successfully"
    required_fields: [event_id, timestamp, skill_id, role_id, phase, output_artifacts, exit_criteria_results]
    optional_fields: [duration_seconds, kpi_impact, memory_write_triggered]
    example:
      event_id: "EVT_20260310_002"
      timestamp: "2026-03-10T15:45:00Z"
      skill_id: "SKILL_SDE_IMPLEMENTATION"
      role_id: "ROLE_SDE"
      phase: "BUILD"
      output_artifacts: ["implementation.md", "code_changes.diff"]
      exit_criteria_results:
        - criterion: "Code compiles without errors"
          status: "passed"
        - criterion: "Architecture constraints satisfied"
          status: "passed"
      duration_seconds: 3600
      kpi_impact:
        defect_detection_rate: 0.02

  - event_type: skill_failed
    description: "Emitted when a skill fails to meet exit criteria"
    required_fields: [event_id, timestamp, skill_id, role_id, phase, failure_reason, exit_criteria_results]
    optional_fields: [retry_count, escalated_to, recommended_remediation]
    example:
      event_id: "EVT_20260310_003"
      timestamp: "2026-03-10T16:00:00Z"
      skill_id: "SKILL_QA_TEST_EXECUTION"
      role_id: "ROLE_QA"
      phase: "TEST"
      failure_reason: "Test suite coverage dropped below 60% threshold"
      exit_criteria_results:
        - criterion: "Test coverage >= 60%"
          status: "failed"
          actual_value: 52
      retry_count: 0
      escalated_to: "ROLE_SDE"

  - event_type: challenge_raised
    description: "Emitted when one role challenges another's artifact or decision"
    required_fields: [event_id, timestamp, challenger_role, challenged_role, challenge_type, evidence, phase]
    optional_fields: [resolution_sla_hours, priority, challenge_id]
    example:
      event_id: "EVT_20260310_004"
      timestamp: "2026-03-10T16:15:00Z"
      challenger_role: "ROLE_SEC"
      challenged_role: "ROLE_SDE"
      challenge_type: "pii_exposure"
      phase: "QUALITY"
      evidence:
        - "PII found in debug logs: heartRate, HRV values"
        - "Log audit exit criterion failed"
      resolution_sla_hours: 4
      priority: "critical"

  - event_type: gate_passed
    description: "Emitted when a phase transition gate is passed and orchestration advances"
    required_fields: [event_id, timestamp, from_phase, to_phase, gate_conditions_met]
    optional_fields: [artifacts_verified, sign_offs, transition_time_minutes]
    example:
      event_id: "EVT_20260310_005"
      timestamp: "2026-03-10T17:00:00Z"
      from_phase: "BUILD"
      to_phase: "TEST"
      gate_conditions_met:
        - "All exit criteria for BUILD phase passed"
        - "No unresolved challenges"
        - "KPI baseline established"
      artifacts_verified: ["implementation.md", "code_changes.diff"]
      sign_offs: ["ROLE_SDE", "ROLE_PE"]

  - event_type: gate_blocked
    description: "Emitted when a phase transition gate blocks progress to next phase"
    required_fields: [event_id, timestamp, from_phase, to_phase, blocking_conditions, recommended_actions]
    optional_fields: [escalated_to, human_review_required, estimated_remediation_hours]
    example:
      event_id: "EVT_20260310_006"
      timestamp: "2026-03-10T17:15:00Z"
      from_phase: "QUALITY"
      to_phase: "LAUNCH"
      blocking_conditions:
        - "Privacy violation: PII in crash report metadata"
        - "Defect escape rate exceeds 5%"
      recommended_actions:
        - "Remove PII from MetricKit payload"
        - "Add privacy test cases"
        - "Re-run QA test suite"
      human_review_required: true
      estimated_remediation_hours: 8

  - event_type: memory_consulted
    description: "Emitted when orchestrator queries long-term memory at cycle start"
    required_fields: [event_id, timestamp, memory_queries_executed, artifacts_produced]
    optional_fields: [patterns_found, anomalies_detected]
    example:
      event_id: "EVT_20260310_007"
      timestamp: "2026-03-10T09:00:00Z"
      memory_queries_executed:
        - "previous_cycle_results"
        - "skill_performance_history"
        - "bug_trend"
      artifacts_produced: ["memory_context.md"]
      patterns_found:
        - "SDE implementation skill completion rate trending down (0.95→0.92)"
        - "Privacy violations increasing (1 in v0.2→2 in v0.3)"

emission_rules:
  - trigger: "Skill execution begins"
    emit: skill_started
    target: run_events.jsonl
    timing: "synchronous at SKILL.run() entry"

  - trigger: "All exit criteria pass for a skill"
    emit: skill_completed
    target: run_events.jsonl
    timing: "synchronous at SKILL.run() exit, before exit_criteria check"

  - trigger: "Any exit criterion fails for a skill"
    emit: skill_failed
    target: run_events.jsonl
    timing: "synchronous when exit_criteria.evaluate() returns False"

  - trigger: "Role challenges another role's artifact or decision"
    emit: challenge_raised
    target: run_events.jsonl
    timing: "synchronous at challenge submission"

  - trigger: "Phase transition conditions all met"
    emit: gate_passed
    target: run_events.jsonl
    timing: "synchronous at phase transition, before state change"

  - trigger: "Phase transition blocked by unmet conditions"
    emit: gate_blocked
    target: run_events.jsonl
    timing: "synchronous when gate conditions fail"

  - trigger: "Orchestrator queries memory at MEMORY_CONSULT state"
    emit: memory_consulted
    target: run_events.jsonl
    timing: "synchronous at MEMORY_CONSULT state entry"

event_schema:
  event_id_format: "EVT_{YYYYMMDD}_{NNN}"
  timestamp_format: "ISO 8601 with timezone (e.g., 2026-03-10T14:30:00Z)"
  storage:
    path: "orchestrator/run_events.jsonl"
    format: "JSONL (one event per line, append-only)"
    retention: "indefinite (append-only log)"
  indexing:
    - "event_type (for aggregation by event class)"
    - "skill_id (for skill performance trending)"
    - "phase (for phase-specific analysis)"
    - "timestamp (for temporal queries and ranges)"
    - "role_id (for role contribution tracking)"
  query_patterns:
    - "filter by event_type → 'skill_completed' events for SDE"
    - "filter by phase → all BUILD phase events"
    - "filter by timestamp range → events in last cycle"
    - "aggregate by role_id → skill count per role"
    - "trend analysis → skill_completion_rate over time"
    - "challenge analysis → all challenges raised, by type and resolution"
  performance_characteristics:
    append_latency_ms: "< 10"
    query_latency_ms: "< 500 for typical time-range queries"
    disk_space_per_cycle: "~50-100 KB (100+ events per cycle)"
